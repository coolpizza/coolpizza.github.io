name: Refresh Xevious Dashboard Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: xevious-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Refresh dashboard snapshot
        env:
          KMA_AUTH_KEY: ${{ secrets.KMA_AUTH_KEY }}
        run: |
          git pull --rebase origin main
          python xevious/update_data.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add xevious/dashboard-data.js xevious/dashboard-data.json
          if git diff --cached --quiet; then
            echo "No dashboard data changes."
            exit 0
          fi
          git commit -m "Refresh xevious dashboard data"
          git push origin main
